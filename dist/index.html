<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, height=device-height">
  <title>SkyBloom</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #0b1026;
      font-family: 'Sora', 'Outfit', 'Segoe UI', system-ui, sans-serif;
    }
    #loading {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f2f5ff;
      background:
        radial-gradient(1.5px 1.5px at 14% 16%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1px 1px at 36% 8%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 58% 24%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.8), transparent 60%),
        linear-gradient(180deg, #0b1026 0%, #2a2c5a 38%, #46518f 58%, #ff7744 74%, #2a1a3a 100%);
      z-index: 1000;
    }
    #loading .vc-kicker {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(242, 245, 255, 0.62);
      margin-bottom: 14px;
    }
    #loading h1 {
      margin: 0 0 22px;
      font-weight: 800;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: 0.16em;
      text-shadow: 0 2px 24px rgba(13, 18, 38, 0.8);
    }
    canvas {
      display: block;
    }

    /* Enhanced CSS Water System */
    #css-water-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .css-water-layer {
      position: absolute;
      bottom: 0;
      left: -10%;
      width: 120%;
      background: linear-gradient(45deg,
        rgba(0, 102, 170, 0.8) 0%,
        rgba(0, 136, 204, 0.9) 30%,
        rgba(0, 170, 255, 0.7) 70%,
        rgba(0, 68, 136, 0.8) 100%);
      animation: css-water-wave 4s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .css-water-layer:nth-child(2) {
      animation-delay: 1s;
      opacity: 0.6;
      transform: scaleX(1.1);
    }

    .css-water-layer:nth-child(3) {
      animation-delay: 2s;
      opacity: 0.4;
      transform: scaleX(1.2);
    }

    @keyframes css-water-wave {
      0%, 100% {
        transform: translateY(0px) rotateX(0deg);
        filter: hue-rotate(0deg) brightness(1);
      }
      25% {
        transform: translateY(-10px) rotateX(1deg);
        filter: hue-rotate(5deg) brightness(1.1);
      }
      50% {
        transform: translateY(-20px) rotateX(0deg);
        filter: hue-rotate(10deg) brightness(1.2);
      }
      75% {
        transform: translateY(-10px) rotateX(-1deg);
        filter: hue-rotate(5deg) brightness(1.1);
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BJ6_H6mg.js"></script>

</head>

  <div id="loading">
    <div style="text-align: center; display: flex; flex-direction: column; align-items: center;">
      <div class="vc-kicker">an open-sky game for humans and machines</div>
      <h1>SkyBloom</h1>
      <div id="progress-bar" style="width: 280px; height: 3px; background: rgba(255, 255, 255, 0.14); border-radius: 2px; overflow: hidden; margin-bottom: 16px;">
        <div id="progress" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc66, #ff66cc); transition: width 0.3s;"></div>
      </div>
      <p id="loading-text" style="margin: 0; font-size: 13px; color: rgba(242, 245, 255, 0.62);">weaving the sky…</p>
    </div>
  </div>
  <div id="ui-container"></div>
  <canvas id="game-canvas"></canvas>
 
</body>
</html>
